nome:  gerar  jogo do Pac-Man 

on: schedule: # Executa automaticamente a cada 24 horas - cron: "0 */24 * * *" workflow_dispatch: # Permite acionamento manual push: # Executa a cada push para a branch principal branches: - main
   
      
   
   
    
       

tarefas: gerar: permissões: conteúdo: gravação executa em: ubuntu-latest tempo limite em minutos: 5
  
    
       
     
     

    passos: - nome: gerar pacman-contribution-graph.svg usa: abozanona/pacman-contribution-graph@main com: github_user_name: ${{ github.repository_owner }}
         
         
        
             

      # Enviar o SVG gerado para o branch de saída - nome: enviar pacman-contribution-graph.svg para o branch de saída uses: crazy-max/ ghaction-github-pages@v3.1.0 with: target_branch: output build_dir: dist env: GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
